name: Spec Kit direct Quack cutover

on:
  push:
    branches:
      - agent/003-quack-runner-spec-implementation
    paths:
      - .github/workflows/spec-kit-direct-quack.yml

permissions:
  contents: write

jobs:
  cutover:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/003-quack-runner-spec-implementation
          fetch-depth: 0

      - name: Apply direct Quack cleanup
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re

          def load(path):
              return Path(path).read_text(encoding="utf-8")

          def save(path, text):
              Path(path).write_text(text, encoding="utf-8", newline="\n")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          engine_path = "crates/duckdb-engine/src/lib.rs"
          engine = load(engine_path)
          engine = replace_once(
              engine,
              "execution_route: ExecutionRoute::CliCompatibility,",
              "execution_route: ExecutionRoute::OfficialRunner,",
              "DuckdbEngine default route",
          )
          save(engine_path, engine)

          desktop_path = "apps/desktop/src/lib.rs"
          desktop = load(desktop_path)
          desktop = replace_once(
              desktop,
              "                let bin = resolve_duckdb_bin(&dir);\n                std::env::set_var(\"DUCKLE_DUCKDB_BIN\", &bin);\n                let _ = DUCKDB_BIN.set(bin);\n",
              "",
              "desktop CLI bootstrap",
          )
          start = desktop.index("static DUCKDB_BIN: OnceLock<PathBuf> = OnceLock::new();")
          end = desktop.index("/// Create a per-run engine", start)
          desktop = (
              desktop[:start]
              + "static DUCKDB_ENGINE: OnceLock<DuckdbEngine> = OnceLock::new();\n\n"
              + "/// Shared engine shell. Pipeline execution always receives the workspace\n"
              + "/// Quack controller in `engine_for_run`; no DuckDB CLI path is resolved.\n"
              + "fn engine() -> Result<DuckdbEngine, String> {\n"
              + "    Ok(DUCKDB_ENGINE\n"
              + "        .get_or_init(|| DuckdbEngine::new(PathBuf::new()))\n"
              + "        .clone())\n"
              + "}\n\n"
              + desktop[end:]
          )
          desktop = replace_once(
              desktop,
              "        eng = eng.with_runner_selection(ctrl.entry_point_class(), &ctrl.cutover_gate());\n",
              "",
              "desktop cutover selector",
          )
          save(desktop_path, desktop)

          controller_path = "crates/duckle-runner/src/runner_controller.rs"
          controller = load(controller_path)
          controller = controller.replace(
              "use duckle_db_runner::cutover::{CutoverGate, EntryPointClass};\n",
              "",
          )
          controller = re.sub(
              r"\n\s*// Transitional engine API:.*?engine\.with_runner_selection\(EntryPointClass::Production, &CutoverGate::Approved\)\n",
              "\n    engine\n",
              controller,
              count=1,
              flags=re.S,
          )
          save(controller_path, controller)

          main_path = "crates/duckle-runner/src/main.rs"
          main = load(main_path)
          main = main.replace(
              "runner_controller::engine_for_workspace(duckdb, &workspace)",
              "runner_controller::engine_for_workspace(&workspace)",
          )
          main = main.replace(
              "runner_controller::engine_for_workspace(duckdb, &ws_root)",
              "runner_controller::engine_for_workspace(&ws_root)",
          )
          save(main_path, main)

          serve_path = "crates/duckle-runner/src/serve.rs"
          serve = load(serve_path)
          serve = re.sub(
              r"crate::runner_controller::engine_for_workspace\(\s*state\.duckdb\.clone\(\),\s*&state\.workspace,?\s*\)",
              "crate::runner_controller::engine_for_workspace(&state.workspace)",
              serve,
          )
          save(serve_path, serve)
          '@ | python -

      - name: Validate direct Quack build path
        id: validate
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $log = 'spec-kit-direct-quack.log'
          Remove-Item $log -Force -ErrorAction SilentlyContinue
          $commands = @(
            'cargo test -p duckle-db-runner --test single_runner_cutover',
            'cargo build --release -p duckle-runner --bins',
            'cargo check -p duckle-runner',
            'cargo check -p duckle-desktop',
            'cargo check -p duckle-mcp',
            'cargo check -p duckle-scheduler'
          )
          $failed = $false
          foreach ($command in $commands) {
            "`n=== $command ===" | Tee-Object -FilePath $log -Append
            cmd /c $command 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) {
              $failed = $true
              break
            }
          }
          if ($failed) {
            "ok=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "ok=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Commit successful implementation
        if: steps.validate.outputs.ok == 'true'
        shell: pwsh
        run: |
          Remove-Item .github/workflows/spec-kit-direct-quack.yml -Force
          Remove-Item specs/003-quack-sidecar-database-runner/last-ci-failure.log -Force -ErrorAction SilentlyContinue
          git config user.name "spec-kit-agent"
          git config user.email "spec-kit-agent@users.noreply.github.com"
          git add -A
          git commit -m "refactor: make Quack the only packaged runtime"
          git push origin HEAD:agent/003-quack-runner-spec-implementation

      - name: Record validation failure
        if: steps.validate.outputs.ok != 'true'
        shell: pwsh
        run: |
          Copy-Item spec-kit-direct-quack.log specs/003-quack-sidecar-database-runner/last-ci-failure.log -Force
          git config user.name "spec-kit-agent"
          git config user.email "spec-kit-agent@users.noreply.github.com"
          git add specs/003-quack-sidecar-database-runner/last-ci-failure.log
          git commit -m "test: record direct Quack validation failure"
          git push origin HEAD:agent/003-quack-runner-spec-implementation
          exit 1
