name: Finalize Quack-only runtime

on:
  push:
    branches:
      - agent/003-quack-runner-spec-implementation

permissions:
  contents: write

jobs:
  finalize:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/003-quack-runner-spec-implementation
          fetch-depth: 0

      - name: Remove executable DuckDB CLI route
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8", newline="\n")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def sub_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return updated

          engine_path = Path("crates/duckdb-engine/src/lib.rs")
          engine = read(engine_path)
          engine = engine.replace(
              "//! Duckle DuckDB engine adapter - CLI-driven.\n",
              "//! Duckle execution engine using the packaged Quack sidecar.\n",
              1,
          )
          engine = engine.replace(
              "use duckle_db_runner::cutover::{select_runner, CutoverGate, EntryPointClass, RunnerSelection};",
              "use duckle_db_runner::cutover::{CutoverGate, EntryPointClass};",
              1,
          )
          engine = engine.replace("use std::process::Stdio;\n", "", 1)
          engine = replace_once(
              engine,
              "pub enum ExecutionRoute {\n    CliCompatibility,\n    OfficialRunner,\n}",
              "pub enum ExecutionRoute {\n    OfficialRunner,\n}",
              "single execution route enum",
          )
          engine = replace_once(
              engine,
              "execution_route: ExecutionRoute::CliCompatibility,",
              "execution_route: ExecutionRoute::OfficialRunner,",
              "default Quack route",
          )
          engine = sub_once(
              engine,
              r"    /// Selects a backend according to the explicit cutover gate\..*?    pub fn with_runner_selection\(\n        &self,\n        entry_point: EntryPointClass,\n        gate: &CutoverGate,\n    \) -> DuckdbEngine \{.*?\n    \}\n",
              "    /// Retained source-compatible adapter. The arguments cannot alter routing;\n"
              "    /// every engine instance uses the packaged Quack runner.\n"
              "    pub fn with_runner_selection(\n"
              "        &self,\n"
              "        _entry_point: EntryPointClass,\n"
              "        _gate: &CutoverGate,\n"
              "    ) -> DuckdbEngine {\n"
              "        DuckdbEngine {\n"
              "            bin: self.bin.clone(),\n"
              "            cancel: self.cancel.clone(),\n"
              "            execution_route: ExecutionRoute::OfficialRunner,\n"
              "            official_runner: self.official_runner.clone(),\n"
              "            official_cancellation: self.official_cancellation.clone(),\n"
              "        }\n"
              "    }\n",
              "fixed runner selection adapter",
          )
          engine = sub_once(
              engine,
              r"    /// Run SQL through the CLI against an optional db file\..*?    fn run\(&self, db: Option<&Path>, sql: &str, json: bool\) -> Result<String, EngineError> \{.*?\n    \}\n\n    /// Run SQL and return",
              "    /// The retired CLI execution boundary. Kept only while callers are\n"
              "    /// migrated to RunDatabase; it can never spawn an external process.\n"
              "    fn run(&self, db: Option<&Path>, sql: &str, json: bool) -> Result<String, EngineError> {\n"
              "        let _ = (db, sql, json);\n"
              "        Err(EngineError::Config(\"runner_unavailable\".into()))\n"
              "    }\n\n"
              "    /// Run SQL and return",
              "retire CLI process spawn",
          )
          engine = engine.replace("ExecutionRoute::CliCompatibility", "ExecutionRoute::OfficialRunner")
          write(engine_path, engine)

          desktop_path = Path("apps/desktop/src/lib.rs")
          desktop = read(desktop_path)
          desktop = replace_once(
              desktop,
              "                let bin = resolve_duckdb_bin(&dir);\n                std::env::set_var(\"DUCKLE_DUCKDB_BIN\", &bin);\n                let _ = DUCKDB_BIN.set(bin);\n",
              "",
              "desktop CLI bootstrap",
          )
          desktop = sub_once(
              desktop,
              r"static DUCKDB_BIN: OnceLock<PathBuf> = OnceLock::new\(\);.*?/// Create a per-run engine",
              "static DUCKDB_ENGINE: OnceLock<DuckdbEngine> = OnceLock::new();\n\n"
              "/// Shared Quack engine shell. A workspace controller is attached for each run.\n"
              "fn engine() -> Result<DuckdbEngine, String> {\n"
              "    Ok(DUCKDB_ENGINE\n"
              "        .get_or_init(|| DuckdbEngine::new(PathBuf::new()))\n"
              "        .clone())\n"
              "}\n\n"
              "/// Create a per-run engine",
              "desktop engine constructor",
          )
          desktop = desktop.replace(
              "        eng = eng.with_runner_selection(ctrl.entry_point_class(), &ctrl.cutover_gate());\n",
              "",
              1,
          )
          desktop = sub_once(
              desktop,
              r"#\[tauri::command\]\nfn engine_status\(app: tauri::AppHandle\) -> Result<Vec<EngineStatus>, String> \{.*?\n\}",
              "#[tauri::command]\n"
              "fn engine_status(app: tauri::AppHandle) -> Result<Vec<EngineStatus>, String> {\n"
              "    let dir = app.path().app_data_dir().map_err(|e| e.to_string())?;\n"
              "    let mut statuses = engine_manager::status(&dir);\n"
              "    statuses.retain(|status| status.id != \"duckdb\");\n"
              "    statuses.insert(0, EngineStatus {\n"
              "        id: \"duckdb\".into(),\n"
              "        name: \"DuckDB / Quack\".into(),\n"
              "        description: \"Packaged database runner\".into(),\n"
              "        required: true,\n"
              "        installed: true,\n"
              "        version: Some(env!(\"DUCKLE_RUNNER_DUCKDB_VERSION\").into()),\n"
              "        target_version: env!(\"DUCKLE_RUNNER_DUCKDB_VERSION\").into(),\n"
              "        outdated: false,\n"
              "        path: None,\n"
              "        available: true,\n"
              "    });\n"
              "    Ok(statuses)\n"
              "}",
              "packaged runner status",
          )
          write(desktop_path, desktop)

          for test_path in Path("crates/duckdb-engine/tests").glob("*.rs"):
              text = read(test_path)
              if "ExecutionRoute::CliCompatibility" in text:
                  write(test_path, text.replace(
                      "ExecutionRoute::CliCompatibility",
                      "ExecutionRoute::OfficialRunner",
                  ))
          '@ | python -

      - name: Verify no CLI process spawn remains
        shell: pwsh
        run: |
          if (git grep -n "Command::new(&self.bin)" -- crates/duckdb-engine/src/lib.rs) {
            throw "DuckDB CLI process spawn still exists"
          }

      - name: Build packaged runner pair
        shell: pwsh
        run: cargo build --release -p duckle-runner --bins

      - name: Check workspace entry points
        shell: pwsh
        run: |
          cargo test -p duckle-db-runner --test single_runner_cutover
          cargo check -p duckle-runner
          cargo check -p duckle-desktop
          cargo check -p duckle-mcp
          cargo check -p duckle-scheduler

      - name: Commit finalized runtime
        shell: pwsh
        run: |
          Remove-Item .github/workflows/spec-kit-finalize-quack.yml -Force
          Remove-Item specs/003-quack-sidecar-database-runner/.finalize-trigger -Force -ErrorAction SilentlyContinue
          git config user.name "spec-kit-agent"
          git config user.email "spec-kit-agent@users.noreply.github.com"
          git add -A
          git commit -m "refactor: retire executable DuckDB CLI route"
          git push origin HEAD:agent/003-quack-runner-spec-implementation
