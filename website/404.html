<style>
  :root{--bg:#07090f;--card:#0d111b;--line:#1b2130;--text:#eef2f8;--muted:#96a4b6;--accent:#ff7a28;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 85% -10%, rgba(255,122,40,.12), transparent 60%),var(--bg);

  .brand span{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .code{font-size:88px;font-weight:800;line-height:1;letter-spacing:-.03em;
    background:linear-gradient(180deg,#ffd44d,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;margin:0}
  h1{font-size:24px;font-weight:700;margin:14px 0 8px}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin:0 auto 26px;max-width:440px}
  .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;padding:11px 20px;border-radius:10px;font-weight:600;text-decoration:none;font-size:15px}
  a.primary{background:var(--accent);color:#1a0f06}
  a.ghost{border:1px solid var(--line);color:var(--text)}
  a.ghost:hover{border-color:var(--accent)}
</style>
</head>
