<text x="276" y="19.5" class="m dim" font-size="11.5">pip install duckle</text>
<text x="18" y="65" class="m"><tspan class="p">$</tspan> <tspan class="c">pip install duckle</tspan></text>
<text x="18" y="86" class="m dim">Downloading&#160;duckle-0.5.9-py3-none-win_amd64.whl&#160;(23.0&#160;MB)</text>
<text x="18" y="107" class="m dim">Downloading&#160;duckdb_cli-1.5.4-py3-none-win_amd64.whl&#160;(12.9&#160;MB)</text>
<text x="18" y="128" class="m ok">Successfully&#160;installed&#160;duckdb-cli-1.5.4&#160;duckle-0.5.9</text>
<text x="18" y="170" class="m dim">#&#160;three&#160;commands,&#160;and&#160;the&#160;engine,&#160;on&#160;your&#160;PATH:</text>
<text x="18" y="191" class="m dim">#&#160;&#160;&#160;duckle&#160;&#160;&#160;duckle-mcp&#160;&#160;&#160;duckdb</text>
<text x="18" y="233" class="m"><tspan class="p">$</tspan> <tspan class="c">cat job.py</tspan></text>
<text x="18" y="254" class="m key">import&#160;duckle</text>
<text x="18" y="275" class="m key">from&#160;duckle&#160;import&#160;col</text>
<text x="18" y="317" class="m out">(duckle.read_csv("orders.csv")</text>
<text x="18" y="338" class="m out">&#160;&#160;&#160;&#160;.where(col.amount&#160;&gt;=&#160;20)</text>
<text x="18" y="359" class="m out">&#160;&#160;&#160;&#160;.derive(total="round(amount&#160;*&#160;1.2,&#160;2)")</text>
<text x="18" y="380" class="m out">&#160;&#160;&#160;&#160;.write_parquet("out.parquet")</text>
<text x="18" y="401" class="m out">&#160;&#160;&#160;&#160;.run())</text>
<text x="18" y="443" class="m"><tspan class="p">$</tspan> <tspan class="c">python job.py</tspan></text>
<text x="18" y="464" class="m out">status&#160;&#160;&#160;:&#160;ok</text>
<text x="18" y="485" class="m dim">duration&#160;:&#160;388&#160;ms</text>
<text x="18" y="506" class="m ok">&#160;&#160;csv&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;ok&#160;(5&#160;rows)</text>
<text x="18" y="527" class="m ok">&#160;&#160;filter&#160;&#160;&#160;&#160;&#160;ok&#160;(3&#160;rows)</text>
<text x="18" y="548" class="m ok">&#160;&#160;pyexpr&#160;&#160;&#160;&#160;&#160;ok&#160;(3&#160;rows)</text>
<text x="18" y="569" class="m ok">&#160;&#160;parquet&#160;&#160;&#160;&#160;ok&#160;(3&#160;rows)</text>
<text x="18" y="611" class="m dim">#&#160;Python&#160;built&#160;the&#160;plan.&#160;DuckDB&#160;moved&#160;the&#160;rows.</text>
