# Linux self-contained ODBC (issue #131).
#
# The Teradata connector links the unixODBC driver manager statically on Linux
# (engine feature `teradata-static`), so a shipped Linux binary needs no system
# libodbc.so.2 to launch. odbc-sys's `static` feature uses
# `#[link(name = "odbc", kind = "static")]`, which makes rustc bundle libodbc.a
# at compile time - so the static archives must be on rustc's library search
# path. Add the Debian/Ubuntu multiarch lib dir (where `unixodbc-dev` +
# `libltdl-dev` install libodbc.a / libodbcinst.a / libltdl.a) for the gnu Linux
# targets. The musl target is intentionally absent: the musl runner excludes
# Teradata entirely.
#
# On a non-Debian distro, point ODBC_SYS_STATIC_PATH at your unixODBC lib dir
# instead (or adjust the path below); on Windows/macOS this file does nothing.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-L", "native=/usr/lib/x86_64-linux-gnu"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-L", "native=/usr/lib/aarch64-linux-gnu"]
